name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  seo-and-payments:
    runs-on: ubuntu-latest
    env:
      VITE_PADDLE_ENVIRONMENT: ${{ secrets.VITE_PADDLE_ENVIRONMENT }}
      VITE_PADDLE_TOKEN: ${{ secrets.VITE_PADDLE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gates
        run: pnpm check:seo
