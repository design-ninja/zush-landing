<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#000000"/>
  
  <!-- Outer glow -->
  <rect width="512" height="512" rx="128" fill="url(#gradient1)" opacity="0.3"/>
  
  <!-- Main icon - Modern compass/navigation concept -->
  <g transform="translate(256, 256)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="160" stroke="#FF7A00" stroke-width="12" fill="none" opacity="0.3"/>
    
    <!-- Cardinal points -->
    <circle cx="0" cy="-140" r="8" fill="#FF7A00"/>
    <circle cx="140" cy="0" r="8" fill="#FF7A00"/>
    <circle cx="0" cy="140" r="8" fill="#FF7A00"/>
    <circle cx="-140" cy="0" r="8" fill="#FF7A00"/>
    
    <!-- Inner ring with gradient -->
    <circle cx="0" cy="0" r="100" stroke="url(#gradient2)" stroke-width="16" fill="none"/>
    
    <!-- AI Brain/Network nodes -->
    <g opacity="0.8">
      <!-- Top-right cluster -->
      <circle cx="60" cy="-60" r="6" fill="#FF7A00"/>
      <circle cx="80" cy="-40" r="5" fill="#FF7A00"/>
      <circle cx="70" cy="-80" r="4" fill="#FF7A00"/>
      <line x1="60" y1="-60" x2="80" y2="-40" stroke="#FF7A00" stroke-width="2"/>
      <line x1="60" y1="-60" x2="70" y2="-80" stroke="#FF7A00" stroke-width="2"/>
      
      <!-- Bottom-left cluster -->
      <circle cx="-60" cy="60" r="6" fill="#FF7A00"/>
      <circle cx="-80" cy="40" r="5" fill="#FF7A00"/>
      <circle cx="-70" cy="80" r="4" fill="#FF7A00"/>
      <line x1="-60" y1="60" x2="-80" y2="40" stroke="#FF7A00" stroke-width="2"/>
      <line x1="-60" y1="60" x2="-70" y2="80" stroke="#FF7A00" stroke-width="2"/>
      
      <!-- Connecting lines to center -->
      <line x1="60" y1="-60" x2="0" y2="0" stroke="#FF7A00" stroke-width="1.5" opacity="0.4"/>
      <line x1="-60" y1="60" x2="0" y2="0" stroke="#FF7A00" stroke-width="1.5" opacity="0.4"/>
    </g>
    
    <!-- Center core - pulsing dot -->
    <circle cx="0" cy="0" r="24" fill="#000000" stroke="#FF7A00" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="#FF7A00"/>
    
    <!-- Directional pointer/arrow -->
    <g transform="rotate(-45)">
      <path d="M 0,-60 L 15,-30 L 0,-35 L -15,-30 Z" fill="#FF7A00" opacity="0.9"/>
    </g>
    
    <!-- Subtle grid lines -->
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#FF7A00" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#FF7A00" stroke-width="1" opacity="0.15"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="gradient1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FF7A00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF7A00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="50%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </linearGradient>
  </defs>
</svg>
